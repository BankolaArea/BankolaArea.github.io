<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Performance-first Meta Refresh -->
    <meta http-equiv="refresh" content="0; url=https://cil.infinityfreeapp.com/welcome.php">
    <link rel="canonical" href="https://cil.infinityfreeapp.com/welcome.php">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            /* Dark sleek background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #f8fafc;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .text {
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <span class="loader"></span>
        <div class="text">Coal India Limited</div>
    </div>

    <script>
        // Use replace to prevent the user from getting stuck in a redirect loop on 'back' button press
        window.location.replace("https://cil.infinityfreeapp.com/welcome.php");
    </script>
</body>

</html>
